<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send SMS</title>

<style>

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f3f4f6;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:420px;
  background:white;
  padding:22px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

.header-img{
  width:100%;
  height:auto;
  max-height:140px;
  border-radius:10px;
  margin-bottom:15px;
}

.message-box{
  background:#f1f5f9;
  padding:15px;
  border-radius:10px;
  font-size:16px;
  margin-bottom:20px;
  text-align:left;
}

label{
  font-size:14px;
  color:#555;
  display:block;
  text-align:left;
}

input{
  width:100%;
  padding:14px;
  margin-top:6px;
  margin-bottom:18px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:17px;
  font-weight:600;
}

button:active{
  transform:scale(0.98);
}

</style>
</head>

<body>

<div class="container">

<img class="header-img" src="logo_parlour.png">

<div class="message-box" id="message"></div>

<label>Phone number</label>
<input type="tel" id="phone" placeholder="Enter phone number">

<button onclick="sendSMS()">Send SMS</button>

</div>

<script>

function getParam(name){
  const url = new URLSearchParams(window.location.search)
  return url.get(name)
}

const name = getParam("name") || "Stephanie"

const message =
`I absolutely adore my hairstylist ${name} at Parlour at the Point and couldn’t keep her to myself 🤍 Her work is truly exceptional.
She’s graciously shared a special gift for a select few — when you book your first appointment, you’ll receive $25 off your service and $25 off a product. Simply include NEW25 in the notes when booking or mention it at your visit ✨
While I personally see her, you truly can’t go wrong — you’re welcome to book with any stylist in the salon and receive the same incredible care and beautiful results.
And the best part? You can put that $25 toward one of the salon’s amazing product lines — think Oribe, Davines, Mr. Smith, and more — so you’ll leave not only loving your hair, but fully stocked to keep it looking beautiful at home.`

document.getElementById("message").innerText = message

function sendSMS(){

  let phone = document.getElementById("phone").value.trim()

  if(!phone){
    alert("Vui lòng nhập số điện thoại")
    return
  }

  const encoded = encodeURIComponent(message)

  window.location.href = `sms:${phone}?body=${encoded}`
}

</script>

</body>
</html>
