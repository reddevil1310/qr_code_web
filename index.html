<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARLOUR</title>

<style>

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f3f4f6;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px 0;
}

.container{
  width:90%;
  max-width:420px;
  background:url('logo_parlour.png') top/contain no-repeat,#fff;
  padding:22px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

.header-img{
  width:100%;
  height:auto;
  max-height:200px;
  border-radius:10px;
  margin-bottom:15px;
}

.message-box{
  background:rgba(255,255,255,0.5);
  padding:15px;
  border-radius:10px;
  font-size:16px;
  margin-bottom:20px;
  text-align:left;
}

.message-box a{
  color:#2563eb;
  text-decoration:none;
}

.message-box a:hover{
  text-decoration:underline;
}

label{
  font-size:14px;
  color:#555;
  display:block;
  text-align:left;
}

input{
  width:100%;
  padding:14px;
  margin-top:6px;
  margin-bottom:18px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:17px;
  font-weight:600;
}

button:active{
  transform:scale(0.98);
}

</style>
</head>

<body>

<div class="container">

<div class="message-box" id="message"></div>

<label>Phone number</label>
<input type="tel" id="phone" placeholder="Enter phone number">

<button onclick="sendSMS()">Send SMS</button>

</div>

<script>

function getParam(name){
  const url = new URLSearchParams(window.location.search)
  return url.get(name)
}

const name = getParam("name") || "Stephanie"

const message =
`
I absolutely adore my hairstylist ${name} at Parlour at the Point and couldn’t keep her to myself 🤍 Between the incredible product lines they carry — Oribe, Davines, Mr. Smith and more — and the beautiful work coming out of the salon, it’s truly a special place.

Whitney’s work is exceptional, and she’s graciously shared a special gift for a select few. When you book your first appointment, you’ll receive $25 off your service and $25 off a product. Simply include NEW25 in the notes when booking or mention it at your visit ✨

While I personally see Whitney, you truly can’t go wrong — you’re welcome to book with any stylist in the salon and receive the same incredible care and beautiful results.

You can book through the salon website or give them a call to schedule your visit! www.parlouratthepoint.com (831) 316-0845`

const displayMessage = message
  .replace(/\$25 off/g, '<strong>$25 off</strong>')
  .replace(/www\.parlouratthepoint\.com/g, '<a href="https://www.parlouratthepoint.com" target="_blank"><strong>www.parlouratthepoint.com</strong></a>')
  .replace(/\(831\) 316-0845/g, '<br><a href="tel:8313160845"><strong>(831) 316-0845</strong></a>')
  .replace(/\n/g, '<br>')

document.getElementById("message").innerHTML = displayMessage

function sendSMS(){

  let phone = document.getElementById("phone").value.trim()

  if(!phone){
    alert("Vui lòng nhập số điện thoại")
    return
  }

  const encoded = encodeURIComponent(message)

  window.location.href = `sms:${phone}?body=${encoded}`
}

</script>

</body>
</html>
