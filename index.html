<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send SMS</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f2f4f7;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:420px;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

label{
  font-size:14px;
  color:#444;
}

input, textarea{
  width:100%;
  padding:14px;
  margin-top:6px;
  margin-bottom:18px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}

textarea{
  resize:none;
  height:110px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:17px;
  font-weight:600;
}

button:active{
  transform:scale(0.98);
}

.footer{
  text-align:center;
  font-size:12px;
  color:#999;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>Send SMS</h2>

<label>Số điện thoại</label>
<input type="tel" id="phone" placeholder="VD: 0901234567">

<label>Nội dung tin nhắn</label>
<textarea id="message" placeholder="Nhập nội dung..."></textarea>

<button onclick="sendSMS()">Send SMS</button>

<div class="footer">
Mở ứng dụng SMS để gửi
</div>

</div>

<script>
function sendSMS(){

  let phone = document.getElementById("phone").value.trim()
  let message = encodeURIComponent(
      document.getElementById("message").value.trim()
  )

  if(!phone){
      alert("Vui lòng nhập số điện thoại")
      return
  }

  window.location.href = `sms:${phone}?body=${message}`
}
</script>

</body>
</html>
