<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARLOUR</title>

<style>

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f3f4f6;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px 0;
}

.container{
  width:90%;
  max-width:420px;
  background:#fff;
  padding:22px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

.header-img{
  width:100%;
  height:auto;
  max-height:200px;
  border-radius:10px;
  margin-bottom:0px;
}

.message-box{
  background:rgba(255,255,255,0.5);
  padding:5px;
  border-radius:10px;
  font-size:16px;
  margin-bottom:0px;
  text-align:left;
}

.message-box a{
  color:#2563eb;
  text-decoration:none;
  display:inline-block;
  margin-bottom:4px;
}

.message-box a:hover{
  text-decoration:underline;
}

.instagram-link{
  margin:4px 0 0 0;
  font-size:14px;
  text-align:left;
}

.instagram-link a{
  color:#E4405F;
  text-decoration:none;
  font-weight:600;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

label{
  font-size:14px;
  color:#555;
  display:block;
  text-align:left;
}

input{
  width:100%;
  padding:14px;
  margin-top:6px;
  margin-bottom:18px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:17px;
  font-weight:600;
}

button:active{
  transform:scale(0.98);
}

.header-img{
  width:100%;
  height:auto;
  max-height:200px;
  border-radius:10px;
  margin-bottom:0px;
}

</style>
</head>

<body>

<div class="container">
<img class="header-img" src="logo_parlour.png">
<div class="message-box">
  <div id="message"></div>
  <p class="instagram-link">
    <a href="https://www.instagram.com/parlouratthepointsalon/" target="_blank" rel="noopener noreferrer">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#E4405F" width="18" height="18"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.059 1.645-.07 4.849-.07zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
      Check out our Instagram @parlouratthepointsalon
    </a>
  </p>
</div>
<label>Phone number</label>
<input type="tel" id="phone" placeholder="Enter phone number">

<button onclick="sendSMS()">Send SMS</button>

</div>

<script>

function getParam(name){
  const url = new URLSearchParams(window.location.search)
  return url.get(name)
}

const name = getParam("name") || "Stephanie"

const message =
`
I absolutely adore my hairstylist ${name} at Parlour at the Point and couldn’t keep her to myself 🤍 Between the incredible product lines they carry — Oribe, Davines, Mr. Smith and more — and the beautiful work coming out of the salon, it’s truly a special place.

${name}’s work is exceptional, and she’s graciously shared a special gift for a select few. When you book your first appointment, you’ll receive $25 off your service and $25 off a product. Simply include NEW25 in the notes when booking or mention it at your visit ✨

While I personally see ${name}, you truly can’t go wrong — you’re welcome to book with any stylist in the salon and receive the same incredible care and beautiful results.

You can book through the salon website or give them a call to schedule your visit! www.parlouratthepoint.com (831) 316-0845`

const webIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" style="vertical-align:middle;margin-right:4px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>'
const phoneIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" style="vertical-align:middle;margin-right:4px;"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>'
const displayMessage = message
  .replace(/\$25 off/g, '<strong>$25 off</strong>')
  .replace(/www\.parlouratthepoint\.com/g, '<br><a href="https://www.parlouratthepoint.com" target="_blank">' + webIcon + '<strong>www.parlouratthepoint.com</strong></a>')
  .replace(/\(831\) 316-0845/g, '<br><a href="tel:8313160845">' + phoneIcon + '<strong>(831) 316-0845</strong></a>')
  .replace(/\n/g, '<br>')

document.getElementById("message").innerHTML = displayMessage

function sendSMS(){

  let phone = document.getElementById("phone").value.trim()

  if(!phone){
    alert("Please enter a phone number")
    return
  }

  const encoded = encodeURIComponent(message)

  window.location.href = `sms:${phone}?body=${encoded}`
}

</script>

</body>
</html>
